version: "2"

sql:

  - engine: postgresql
    schema: schema.sql
    queries:
      - queries/comments/
      - queries/messages/
      - queries/reactions/
      - queries/blogposts/
    gen:
      go:
        package: database
        out: ../internal/database
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "numeric"
            go_type: "float32"
          # 1. Non-nullable UUIDs (NOT NULL)
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          # 2. Nullable UUIDs (Columns that can be NULL)
          - db_type: "uuid"
            nullable: true
            go_type: "github.com/google/uuid.NullUUID"
          # Or use "*github.com/google/uuid.UUID" for pointers
          - db_type: "timestamptz"
            go_type: "time.Time"
